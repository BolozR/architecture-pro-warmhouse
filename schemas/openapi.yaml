openapi: 3.0.3
info:
  title: WarmHouse API

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Health
  - name: Sensors
  - name: Devices

paths:
  /api/v1/sensors/{sensorId}/temperature:
    get:
      tags: [Sensors]
      summary: Get current temperature for a sensor
      operationId: getTemperature
      parameters:
        - $ref: '#/components/parameters/SensorId'
      responses:
        '200':
          description: Current sensor temperature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemperatureResponse'
        '404':
          description: Sensor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/devices:
    post:
      tags: [Devices]
      summary: Save a device in the system
      operationId: createDevice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeviceRequest'
      responses:
        '201':
          description: Device created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/devices/{deviceId}/heating:
    patch:
      tags: [Devices]
      summary: Switch heating on or off for a device
      operationId: switchHeating
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SwitchHeatingRequest'
      responses:
        '200':
          description: Heating state updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HeatingStateResponse'
        '404':
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  parameters:
    SensorId:
      name: sensorId
      in: path
      required: true
      description: Sensor identifier
      schema:
        type: integer
        format: int64
        minimum: 1
    DeviceId:
      name: deviceId
      in: path
      required: true
      description: Device identifier
      schema:
        type: integer
        format: int64
        minimum: 1

  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    Sensor:
      type: object
      required: [id, location, value]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        location:
          type: string
          example: Living Room
        value:
          type: number
          format: float
          example: 22.4

    Device:
      type: object
      required: [id, name, status]
      properties:
        id:
          type: integer
          format: int64
          example: 10
        name:
          type: string
          example: Boiler Controller
        status:
          type: string
          example: enabled

    CreateDeviceRequest:
      type: object
      required: [name, status]
      properties:
        name:
          type: string
          example: Boiler Controller
        status:
          type: string
          example: disabled

    SwitchHeatingRequest:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
          example: true

    HeatingStateResponse:
      type: object
      required: [deviceId, enabled, status]
      properties:
        deviceId:
          type: integer
          format: int64
          example: 10
        enabled:
          type: boolean
          example: true
        status:
          type: string
          example: heating_enabled

    TemperatureResponse:
      allOf:
        - $ref: '#/components/schemas/Sensor'
        - type: object
          required: [unit]
          properties:
            unit:
              type: string
              example: celsius

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: Sensor not found
